<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 32px; border-radius: 24px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 30px; border: 1px solid #ccc; }
        button { background: #1877f2; color: white; border: none; padding: 10px; width: 100%; border-radius: 30px; cursor: pointer; }
        .flash { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Весенний учёт</h1>
        {% with messages = get_flashed_messages() %}
            {% if messages %}<div class="flash">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="username" placeholder="Логин" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <div style="margin-top: 16px; font-size: 12px;">admin / admin</div>
    </div>
</body>
</html>
